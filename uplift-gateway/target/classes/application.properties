# ===========================================
# Gateway Service Configuration
# ===========================================

# Server
server.port=8080

# Application
spring.application.name=uplift-gateway
spring.profiles.active=dev
spring.main.web-application-type=reactive


spring.data.redis.database=0
spring.data.redis.host=192.168.0.164
spring.data.redis.port=6379
spring.data.redis.password=wLzmySx8RiVuAWHABOtS
spring.data.redis.ssl.enabled=false
spring.data.redis.jedis.pool.max-active=100
spring.data.redis.jedis.pool.max-idle=20
spring.data.redis.jedis.pool.max-wait=-1
spring.data.redis.jedis.pool.min-idle=10


# Gateway Routes
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# CORS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=false

# User Service Route
spring.cloud.gateway.routes[0].id=uplift-user
spring.cloud.gateway.routes[0].uri=lb://uplift-user
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/user/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0

# Sa-Token
sa-token.token-name=Authorization
sa-token.token-prefix=Bearer
sa-token.timeout=2592000
sa-token.activity-timeout=-1
sa-token.is-concurrent=true
sa-token.is-share=false
sa-token.token-style=uuid
sa-token.is-log=true
sa-token.is-read-cookie=false
sa-token.is-read-body=false
sa-token.is-read-header=true

# Logging
logging.level.com.uplift.gateway=DEBUG
logging.level.org.springframework.cloud.gateway=INFO
