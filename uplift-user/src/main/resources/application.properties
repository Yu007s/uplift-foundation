# ===========================================
# User Service Configuration
# ===========================================

# Server
server.port=8081

# Application
spring.application.name=uplift-user
spring.profiles.active=dev

# Nacos Discovery
spring.cloud.nacos.discovery.server-addr=${NACOS_SERVER:192.168.0.164:8848}
spring.cloud.nacos.discovery.namespace=${NACOS_NAMESPACE:jys-local-dev}
spring.cloud.nacos.discovery.group=atlantis-cloud

# Nacos Config
spring.cloud.nacos.config.server-addr=${NACOS_SERVER:192.168.0.164:8848}
spring.cloud.nacos.config.namespace=${NACOS_NAMESPACE:jys-local-dev}
spring.cloud.nacos.config.group=atlantis-cloud
spring.cloud.nacos.config.file-extension=properties
spring.cloud.nacos.config.import-check.enabled=false

# MySQL DataSource
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://206.119.160.33:3306/uplift_user?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=uG5KGKR5XwYUY9Cd4TfN
spring.datasource.druid.initial-size=5
spring.datasource.druid.min-idle=5
spring.datasource.druid.max-active=20
spring.datasource.druid.max-wait=60000

# MyBatis Plus
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

# Sa-Token
sa-token.token-name=Authorization
sa-token.token-prefix=Bearer
sa-token.timeout=2592000
sa-token.activity-timeout=-1
sa-token.is-concurrent=true
sa-token.is-share=false
sa-token.token-style=uuid
sa-token.is-log=true
sa-token.is-read-cookie=false
sa-token.is-read-body=false
sa-token.is-read-header=true

# Logging
logging.level.com.uplift.user=DEBUG
